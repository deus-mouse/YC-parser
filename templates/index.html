<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/styles.css?v=20260330-1">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <h1>Parser</h1>
          <p class="subtitle">Просмотр свободного времени мастеров.</p>
        </div>
        <a class="admin-link" href="/admin">Админка</a>
      </section>

      <section class="card">
        <form id="scan-form" class="form-grid">
          <label class="field">
            <span>Ссылка на страницу с мастерами</span>
            <input id="url" name="url" type="text" required value="">
          </label>
          <label class="field small">
            <span>Глубина, дней</span>
            <input id="days" name="days" type="number" min="1" max="180" value="{{ defaults.default_days }}">
          </label>
          <label class="field small">
            <span>Режим работы</span>
            <div class="time-range">
              <input
                id="working-hours-start"
                name="working_hours_start"
                type="time"
                value=""
              >
              <span class="time-range-separator">—</span>
              <input
                id="working-hours-end"
                name="working_hours_end"
                type="time"
                value=""
              >
            </div>
            <small class="field-hint">Если заполнить, покажем загруженность филиала.</small>
          </label>
          <button id="submit-button" class="button" type="submit">Запустить</button>
        </form>
        <p id="status" class="status">Готов к запуску.</p>
      </section>

      <section id="results-card" class="card hidden">
        <div class="section-head">
          <h2>Результаты</h2>
        </div>
        <p id="summary" class="summary"></p>
        <p id="occupancy" class="summary hidden"></p>
        <div class="table-wrap">
          <table id="results-table">
            <thead>
              <tr>
                <th>Мастер</th>
                <th>Мин. услуга</th>
                <th>Слоты</th>
                <th>Свободно, ч</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      window.APP_DEFAULTS = {{ defaults | tojson }};
    </script>
    <script src="/static/app.js?v=20260330-1"></script>
  </body>
  </html>
